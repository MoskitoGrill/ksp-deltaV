<!DOCTYPE html>
<html lang="cs">
    <head>
        <meta charset="UTF-8" />
        <title>KSP Mission Planner</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div id="routePanel">
            <label>
                Origin
                <select id="originSelect">
                <option value="Kerbin">Kerbin</option>
                <option value="Moho">Moho</option>
                <option value="Eve">Eve</option>
                <option value="Duna">Duna</option>
                <option value="Dres">Dres</option>
                <option value="Jool">Jool</option>
                <option value="Eeloo">Eeloo</option>
                </select>
            </label>

            <label>
                Target
                <select id="targetSelect">
                <option value="" selected>None</option>
                <option value="Kerbol">Kerbol</option>
                <option value="Kerbin">Kerbin</option>
                <option value="Moho">Moho</option>
                <option value="Eve">Eve</option>
                <option value="Duna">Duna</option>
                <option value="Dres">Dres</option>
                <option value="Jool">Jool</option>
                <option value="Eeloo">Eeloo</option>
                </select>
            </label>
        </div>

        <div id="timePanel">
            <div class="timeInputs">
                <label>Year</label>
                <label>Day</label>
                <label>Hour</label>
                <label>Minute</label>

                <input id="yearInput" type="number" value="1" min="1">
                <input id="dayInput" type="number" value="1" min="1" max="426">
                <input id="hourInput" type="number" value="0" min="0" max="5">
                <input id="minuteInput" type="number" value="0" min="0" max="59">
            </div>

            <div class="timeButtons">
                <button id="resetDayOneButton">Day 1</button>
                <button id="timeForwardButton">+</button>
                <button id="timeBackButton">−</button>
            </div>
        </div>

        <button id="moveWholeSystemButton" type="button">
            <span class="satelliteIcon">◆</span>
            <span class="tooltip">System move</span>
        </button>

        <input id="moveWholeSystemInput" type="checkbox" hidden>
        
        <button id="debugToggleButton" title="Debug panel" aria-label="Debug panel"></button>

        <canvas id="spaceCanvas"></canvas>

        <script src="main.js"></script>
    </body>
</html>
