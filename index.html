<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8" />
    <title>KSP Mission Planner</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="uiPanel">
        <div>
            <label for="marginInput">Margin (%):</label>
            <input id="marginInput" type="number" min="0" max="300" value="40" step="5" />
        </div>

        <div style="margin-top: 10px;">
            <label for="timeInput">Time:</label>
            <input id="timeInput" type="range" min="0" max="20000000" value="0" step="10000" />
        </div>
        <div>
            <span id="timeLabel">0 s</span>
        </div>
        </div>

    <canvas id="spaceCanvas"></canvas>

    <script src="main.js"></script>
</body>
</html>
